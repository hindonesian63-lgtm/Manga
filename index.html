<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Manga - Chapter 1</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>⚡ My Manga Series ⚡</h1>
    <p>Chapter 1</p>
</header>

<section class="manga-reader">

    <img src="panel1.jpg" class="panel">
    <img src="panel2.jpg" class="panel">
    <img src="panel3.jpg" class="panel">
    <img src="panel4.jpg" class="panel">

</section>

<footer>
    <p>© 2026 Greninja Pro | All Rights Reserved</p>
</footer>

<script>
    const panels = document.querySelectorAll('.panel');

    const observer = new IntersectionObserver(entries => {
        entries.forEach(entry => {
            if(entry.isIntersecting){
                entry.target.classList.add('show');
            }
        });
    }, { threshold: 0.1 });

    panels.forEach(panel => {
        observer.observe(panel);
    });
</script>

</body>
</html>
